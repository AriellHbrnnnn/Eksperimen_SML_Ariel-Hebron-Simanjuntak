name: Data Preprocessing Pipeline

on:
  push:
    paths:
      - 'credit_risk_dataset_raw/**'
      - 'preprocessing/automate_Ariel-Hebron-Simanjuntak.py'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: preprocessing

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    - name: Run Automation Script
      run: |
        python automate_Ariel-Hebron-Simanjuntak.py --input ../credit_risk_dataset_raw/credit_risk_dataset.csv --output_dir ./credit_risk_dataset_preprocessing
    
    - name: Verify Output
      run: |
        ls -l credit_risk_dataset_preprocessing/
        
    - name: Commit Processed Data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add credit_risk_dataset_preprocessing/
        git commit -m "Update processed dataset via GitHub Actions" || echo "No changes to commit"
        git push
